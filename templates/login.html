{% extends "base.html" %}

{% block title %}Login | College Canteen{% endblock %}

{% block content %}
<section class="form-section">
    <form class="auth-form" method="POST">
        <p class="eyebrow">Student Login</p>
        <h1>Login</h1>
        <p class="hero-copy">Access your cart, payment flow, and live order tracking.</p>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" value="{{ form_data.email if form_data else '' }}" placeholder="student@college.edu" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>
    </form>
</section>
{% endblock %}
